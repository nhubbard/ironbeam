name: Release

on: # zizmor: ignore[dangerous-triggers]
  # Safe: only triggers on completed CI runs on `main`, never on fork PRs.
  # Code reaches `main` only after branch protection required CI to pass on
  # the PR. The release job additionally gates on the `release` environment,
  # requiring manual approval before any publish occurs.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: release  # requires manual approval via GitHub environment protection rules
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write       # create GitHub releases and push changelog commits
      issues: write         # comment on issues closed by a release
      pull-requests: write  # comment on PRs included in a release
      id-token: write       # request OIDC token for crates.io trusted publishing

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --no-self-update
          rustup default nightly

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 'lts/*'

      - name: Install semantic-release and plugins
        run: npm ci

      - name: Authenticate with crates.io (trusted publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: npx semantic-release

