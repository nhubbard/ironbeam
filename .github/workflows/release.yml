name: Release

on:
  workflow_dispatch:

permissions: {}

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    environment: release  # requires manual approval via GitHub environment protection rules
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write       # create GitHub releases and push changelog commits
      issues: write         # comment on issues closed by a release
      pull-requests: write  # comment on PRs included in a release
      id-token: write       # request OIDC token for crates.io trusted publishing

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --no-self-update
          rustup default nightly

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 'lts/*'

      - name: Install semantic-release and plugins
        run: npm ci

      - name: Authenticate with crates.io (trusted publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: npx semantic-release

